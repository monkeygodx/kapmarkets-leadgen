<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KapMarkets — Free E-Book</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0d0d0f;
    --panel-border:#232326;
    --field-bg:#1a1a1d;
    --field-border:#2c2c30;
    --text:#f4f4f5;
    --muted:#9a9aa2;
    --accent-1:#3ddc84;
    --accent-2:#a0f0c0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:80px 24px 40px;
  }
  .header{
    text-align:center;
    max-width:820px;
    margin-bottom:48px;
  }
  .header h1{
    font-size:clamp(28px,4.2vw,46px);
    font-weight:600;
    line-height:1.15;
    margin:0 0 18px;
  }
  .header h1 span{
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .header p{
    font-size:clamp(15px,1.8vw,19px);
    color:var(--muted);
    margin:0;
    font-weight:400;
  }
  .header p b{
    color:var(--accent-2);
    font-weight:600;
  }
  .header p em{
    color:#e4e4e7;
    font-style:normal;
    font-weight:600;
  }
  .card{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:32px;
  }
  .field{
    width:100%;
    background:var(--field-bg);
    border:1px solid var(--field-border);
    border-radius:12px;
    padding:16px 18px;
    color:var(--text);
    font-size:16px;
    margin-bottom:16px;
    outline:none;
    transition:border-color .15s ease;
    font-family:inherit;
  }
  .field::placeholder{color:#7a7a82;}
  .field:focus{border-color:var(--accent-1);}
  select.field{
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' fill='%237a7a82' viewBox='0 0 16 16'><path d='M4 6l4 4 4-4'/></svg>");
    background-repeat:no-repeat;
    background-position:right 16px center;
  }
  .phone-row{display:flex;gap:12px;}
  .phone-row .field{margin-bottom:16px;}
  .phone-row select{flex:0 0 150px;}
  .phone-row input{flex:1;}
  .consent{
    display:flex;
    gap:12px;
    align-items:flex-start;
    margin-bottom:16px;
  }
  .consent input[type="checkbox"]{
    appearance:none;
    -webkit-appearance:none;
    width:20px;
    height:20px;
    flex:0 0 20px;
    border-radius:5px;
    border:1px solid #4a4a52;
    background:var(--field-bg);
    margin-top:2px;
    cursor:pointer;
    position:relative;
  }
  .consent input[type="checkbox"]:checked{
    background:var(--accent-1);
    border-color:var(--accent-1);
  }
  .consent input[type="checkbox"]:checked::after{
    content:"";
    position:absolute;
    left:6px;top:2px;
    width:5px;height:10px;
    border:solid #06131f;
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .consent label{
    font-size:13px;
    line-height:1.5;
    color:var(--muted);
  }
  .consent a{color:var(--accent-2);text-decoration:underline;}
  .submit-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
    color:#06131f;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:4px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .submit-btn:hover{opacity:.92;}
  .submit-btn:active{transform:scale(.99);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}
  .error{
    color:#ff8a8a;
    font-size:13px;
    margin:-8px 0 14px;
    min-height:0;
  }
  .success{
    text-align:center;
    padding:20px 0;
  }
  .success h2{margin:0 0 10px;font-size:22px;}
  .success p{color:var(--muted);margin:0;font-size:15px;}
  .footer-note{
    color:#5a5a60;
    font-size:12px;
    margin-top:28px;
    text-align:center;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Get Kap's <span>Free Marketing E-Book</span></h1>
    <p>Included: <em>7+ Real Case Studies</em> of Creators Earning <b>$100K+/mo</b></p>
  </div>

  <div class="card" id="card">
    <form id="leadForm" novalidate>
      <input class="field" type="text" id="fullName" placeholder="Full Name" autocomplete="name">
      <div class="error" id="err-fullName"></div>

      <input class="field" type="email" id="email" placeholder="Email Address" autocomplete="email">
      <div class="error" id="err-email"></div>

      <div class="phone-row">
        <select class="field" id="countryCode">
          <option value="+1" data-flag="🇺🇸">🇺🇸 United States (+1)</option>
          <option value="+1" data-flag="🇨🇦">🇨🇦 Canada (+1)</option>
          <option value="+44" data-flag="🇬🇧">🇬🇧 United Kingdom (+44)</option>
          <option value="+61" data-flag="🇦🇺">🇦🇺 Australia (+61)</option>
          <option value="+27" data-flag="🇿🇦">🇿🇦 South Africa (+27)</option>
          <option value="+971" data-flag="🇦🇪">🇦🇪 UAE (+971)</option>
        </select>
        <input class="field" type="tel" id="phone" placeholder="Phone Number" autocomplete="tel">
      </div>
      <div class="error" id="err-phone"></div>

      <div class="consent">
        <input type="checkbox" id="smsFollowup">
        <label for="smsFollowup">
          You agree to receive automated follow-up and reminder SMS messages from KapMarkets LLC.
          Message frequency varies. Message and data rates may apply. Reply STOP to end. Reply HELP for help.
          See our <a href="#" onclick="return false;">Terms of Service</a> and <a href="#" onclick="return false;">Privacy Policy</a>.
        </label>
      </div>

      <div class="consent">
        <input type="checkbox" id="smsPromo">
        <label for="smsPromo">
          You agree to receive promotional SMS messages from KapMarkets LLC. Message frequency varies.
          Message and data rates may apply. Reply STOP to end. Reply HELP for help.
          See our <a href="#" onclick="return false;">Terms of Service</a> and <a href="#" onclick="return false;">Privacy Policy</a>.
        </label>
      </div>

      <button class="submit-btn" type="submit" id="submitBtn">Get Instant Access →</button>
    </form>
  </div>

  <div class="footer-note">By submitting, you agree to receive the free marketing e-book by email. Unsubscribe anytime.</div>

<script>
  const form = document.getElementById('leadForm');
  const card = document.getElementById('card');

  function setError(id, msg){
    document.getElementById('err-' + id).textContent = msg || '';
  }

  function validEmail(v){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    let ok = true;

    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    setError('fullName',''); setError('email',''); setError('phone','');

    if(!fullName){ setError('fullName','Enter your full name.'); ok = false; }
    if(!email || !validEmail(email)){ setError('email','Enter a valid email address.'); ok = false; }
    if(!phone || phone.replace(/\D/g,'').length < 7){ setError('phone','Enter a valid phone number.'); ok = false; }

    if(!ok) return;

    const lead = {
      fullName,
      email,
      countryCode: document.getElementById('countryCode').value,
      phone,
      smsFollowup: document.getElementById('smsFollowup').checked,
      smsPromo: document.getElementById('smsPromo').checked,
      submittedAt: new Date().toISOString()
    };

    // No backend wired yet — leads land here for now.
    console.log('New KapMarkets lead:', lead);

    card.innerHTML = `
      <div class="success">
        <h2>You're in, ${fullName.split(' ')[0]}.</h2>
        <p>Check <b style="color:#e4e4e7">${email}</b> — the e-book is on its way.</p>
      </div>
    `;
  });
</script>

</body>
</html>
