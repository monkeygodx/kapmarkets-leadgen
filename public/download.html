<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Download — KapMarkets</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0d0d0f;
    --panel-border:#232326;
    --text:#f4f4f5;
    --muted:#9a9aa2;
    --accent-1:#3ddc84;
    --accent-2:#a0f0c0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    width:100%;
    max-width:480px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:40px 32px;
    text-align:center;
  }
  h1{
    font-size:24px;
    margin:0 0 12px;
  }
  h1 span{
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p{
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
    margin:0 0 24px;
  }
  .download-btn{
    display:inline-block;
    width:100%;
    padding:16px;
    border-radius:12px;
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
    color:#06131f;
    font-size:16px;
    font-weight:700;
    text-decoration:none;
    margin-bottom:12px;
  }
  .spinner{
    width:32px;height:32px;
    border:3px solid var(--panel-border);
    border-top-color:var(--accent-1);
    border-radius:50%;
    margin:0 auto 20px;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{
    color:#ff8a8a;
    font-size:14px;
  }
</style>
</head>
<body>

  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Confirming your <span>purchase</span></h1>
    <p>Give us a second while we verify your payment with Square.</p>
  </div>

<script>
  // --- Map product IDs to actual download links.
  //     Replace these with real file URLs (e.g. links to files stored in
  //     S3 / Cloudflare R2 / Railway volume, or a signed download URL). ---
  const DOWNLOAD_LINKS = {
    book1: 'https://example.com/replace-with-real-link/book1.pdf',
    book2: 'https://example.com/replace-with-real-link/book2.pdf',
    book3: 'https://example.com/replace-with-real-link/book3.pdf',
    bundle: 'https://example.com/replace-with-real-link/all-3-books.zip'
  };

  const card = document.getElementById('card');
  const params = new URLSearchParams(window.location.search);
  const orderRef = params.get('order');

  async function verify(){
    if (!orderRef) {
      showError("We couldn't find your order. If you just paid, check your email — a receipt was sent by Square.");
      return;
    }

    try {
      const res = await fetch(`/api/orders/${orderRef}/verify`);
      const data = await res.json();

      if (!res.ok) {
        showError("We couldn't find that order. If you just paid, contact support with your Square receipt.");
        return;
      }

      if (data.status === 'paid') {
        showSuccess(data.productId, data.productName);
      } else {
        // Payment might still be processing — try once more shortly.
        setTimeout(async () => {
          const retryRes = await fetch(`/api/orders/${orderRef}/verify`);
          const retryData = await retryRes.json();
          if (retryRes.ok && retryData.status === 'paid') {
            showSuccess(retryData.productId, retryData.productName);
          } else {
            showError("Your payment is still processing. Refresh this page in a minute, or check your email for a Square receipt.");
          }
        }, 3000);
      }
    } catch (err) {
      showError('Something went wrong verifying your order. Please refresh this page.');
    }
  }

  function showSuccess(productId, productName){
    const link = DOWNLOAD_LINKS[productId] || '#';
    card.innerHTML = `
      <h1>You're <span>in</span>.</h1>
      <p>Thanks for grabbing <b style="color:#e4e4e7">${productName}</b>. Your download is ready below.</p>
      <a class="download-btn" href="${link}" download>Download Now</a>
      <p style="font-size:13px;">A receipt was also sent to your email by Square.</p>
    `;
  }

  function showError(msg){
    card.innerHTML = `
      <h1>Almost <span>there</span></h1>
      <p class="error-box">${msg}</p>
    `;
  }

  verify();
</script>

</body>
</html>
