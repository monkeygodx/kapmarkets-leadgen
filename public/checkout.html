<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — KapMarkets</title>
<style>
  :root{
    --bg:#000000;
    --panel:#131316;
    --panel-border:#2e2e33;
    --field-bg:#1f1f24;
    --field-border:#3a3a40;
    --text:#f4f4f5;
    --muted:#9a9aa2;
    --accent-1:#3ddc84;
    --accent-2:#a0f0c0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background-color:var(--bg);
    background-image:radial-gradient(circle, #232327 1px, transparent 1px);
    background-size:26px 26px;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:60px 24px 40px;
  }
  .header{
    text-align:center;
    max-width:480px;
    margin-bottom:32px;
  }
  .header h1{
    font-size:clamp(24px,3.5vw,32px);
    font-weight:600;
    margin:0 0 10px;
  }
  .header p{
    color:var(--muted);
    font-size:15px;
    margin:0;
  }
  .card{
    width:100%;
    max-width:440px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:32px;
  }
  .order-summary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:20px;
    margin-bottom:20px;
    border-bottom:1px solid var(--panel-border);
  }
  .order-summary .name{
    font-size:15px;
    color:var(--text);
  }
  .order-summary .price{
    font-size:20px;
    font-weight:700;
    color:var(--accent-2);
  }
  .field-label{
    font-size:13px;
    color:var(--muted);
    margin:0 0 8px;
    display:block;
  }
  .field{
    width:100%;
    background:var(--field-bg);
    border:1px solid var(--field-border);
    border-radius:12px;
    padding:14px 16px;
    color:var(--text);
    font-size:16px;
    margin-bottom:16px;
    outline:none;
    font-family:inherit;
  }
  .field::placeholder{color:#7a7a82;}
  #card-container{
    margin-bottom:16px;
  }
  /* Square injects an iframe here — this wrapper just gives it the same
     visual treatment as the rest of the form fields. */
  #card-container .sq-card-component{
    background:var(--field-bg) !important;
    border:1px solid var(--field-border) !important;
    border-radius:12px !important;
  }
  .order-summary{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-bottom:20px;
    margin-bottom:20px;
    border-bottom:1px solid var(--panel-border);
    position:relative;
    z-index:1;
  }
  .card{
    position:relative;
    z-index:1;
  }
  .pay-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,var(--accent-1),var(--accent-2));
    color:#06131f;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .15s ease, transform .1s ease;
  }
  .pay-btn:hover{opacity:.92;}
  .pay-btn:active{transform:scale(.99);}
  .pay-btn:disabled{opacity:.5;cursor:not-allowed;}
  .error-msg{
    color:#ff8a8a;
    font-size:14px;
    margin:12px 0 0;
    text-align:center;
    min-height:0;
  }
  .secure-note{
    text-align:center;
    color:#5a5a60;
    font-size:12px;
    margin-top:20px;
  }
  .loading-state, .error-state{
    text-align:center;
    color:var(--muted);
    padding:20px 0;
  }
  .wallet-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  #apple-pay-button, #google-pay-button{
    width:100%;
    min-height:48px;
  }
  .wallet-divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:0 0 20px;
    color:var(--muted);
    font-size:13px;
  }
  .wallet-divider::before, .wallet-divider::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--panel-border);
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Complete Your Order</h1>
    <p>Secure checkout — powered by Square</p>
  </div>

  <div class="card" id="checkoutCard">
    <div class="loading-state" id="loadingState">Loading order details...</div>
  </div>

  <div class="secure-note">🔒 Payments processed securely by Square. Your card details never touch our servers.</div>

<script src="https://web.squarecdn.com/v1/square.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const productId = params.get('product');
  const checkoutCard = document.getElementById('checkoutCard');

  async function init(){
    if (!productId) {
      showFatalError('No product specified. Go back and pick an e-book to purchase.');
      return;
    }

    let config, product;
    try {
      const [configRes, productRes] = await Promise.all([
        fetch('/api/config'),
        fetch(`/api/products/${productId}`)
      ]);
      config = await configRes.json();
      if (!productRes.ok) throw new Error('product not found');
      product = await productRes.json();
    } catch (err) {
      showFatalError('Could not load this product. Go back and try again.');
      return;
    }

    if (!config.squareApplicationId || !config.squareLocationId) {
      showFatalError('Checkout is not fully configured yet. Please check back soon.');
      return;
    }

    renderForm(product);

    let payments, card;
    const paymentRequest = payments0 => payments0.paymentRequest({
      countryCode: 'US',
      currencyCode: 'USD',
      total: {
        amount: (product.priceCents / 100).toFixed(2),
        label: product.name
      }
    });

    try {
      payments = window.Square.payments(config.squareApplicationId, config.squareLocationId);
    } catch (err) {
      showFatalError('Could not load the payment system. Please refresh and try again.');
      return;
    }

    // Apple Pay — only renders where the browser/device actually supports it (Safari on Apple devices)
    try {
      const req = paymentRequest(payments);
      const applePay = await payments.applePay(req);
      await applePay.attach('#apple-pay-button', { buttonColor: 'black', buttonType: 'pay' });
      document.getElementById('apple-pay-button').addEventListener('click', () => handleWalletPay(applePay));
    } catch (err) {
      const el = document.getElementById('apple-pay-button');
      if (el) el.style.display = 'none';
    }

    // Google Pay — only renders where the browser/device actually supports it
    try {
      const req = paymentRequest(payments);
      const googlePay = await payments.googlePay(req);
      await googlePay.attach('#google-pay-button', { buttonColor: 'black', buttonType: 'pay' });
      document.getElementById('google-pay-button').addEventListener('click', () => handleWalletPay(googlePay));
    } catch (err) {
      const el = document.getElementById('google-pay-button');
      if (el) el.style.display = 'none';
    }

    async function handleWalletPay(method){
      clearFormError();
      try {
        const tokenResult = await method.tokenize();
        if (tokenResult.status !== 'OK') {
          throw new Error(tokenResult.errors?.[0]?.message || 'Payment was not completed.');
        }
        const res = await fetch('/api/process-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, sourceId: tokenResult.token })
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Payment failed.');
        }
        window.location.href = `/download.html?order=${data.orderRef}`;
      } catch (err) {
        showFormError(err.message || 'Something went wrong. Please try again.');
      }
    }

    try {
      card = await payments.card({
        style: {
          input: {
            color: '#f4f4f5',
            fontSize: '16px'
          },
          'input::placeholder': {
            color: '#7a7a82'
          },
          '.input-container': {
            borderColor: '#3a3a40',
            borderRadius: '12px'
          },
          '.input-container.is-focus': {
            borderColor: '#3ddc84'
          },
          '.input-container.is-error': {
            borderColor: '#ff8a8a'
          },
          '.message-text': {
            color: '#ff8a8a'
          },
          '.message-icon': {
            color: '#ff8a8a'
          }
        }
      });
      await card.attach('#card-container');
    } catch (err) {
      console.error('Square card init failed:', err);
      showFormError('Could not load the payment form. Please refresh and try again.');
      return;
    }

    const payBtn = document.getElementById('payBtn');
    payBtn.addEventListener('click', async () => {
      payBtn.disabled = true;
      payBtn.textContent = 'Processing...';
      clearFormError();

      try {
        const tokenResult = await card.tokenize();
        if (tokenResult.status !== 'OK') {
          throw new Error(tokenResult.errors?.[0]?.message || 'Card details were invalid.');
        }

        const res = await fetch('/api/process-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, sourceId: tokenResult.token })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Payment failed.');
        }

        window.location.href = `/download.html?order=${data.orderRef}`;
      } catch (err) {
        payBtn.disabled = false;
        payBtn.textContent = 'Pay Now';
        showFormError(err.message || 'Something went wrong. Please try again.');
      }
    });
  }

  function renderForm(product){
    checkoutCard.innerHTML = `
      <div class="order-summary">
        <span class="name">${product.name}</span>
        <span class="price">$${(product.priceCents / 100).toFixed(2)}</span>
      </div>
      <div class="wallet-buttons">
        <div id="apple-pay-button"></div>
        <div id="google-pay-button"></div>
      </div>
      <p class="wallet-divider">or pay with card</p>
      <span class="field-label">Card details</span>
      <div id="card-container"></div>
      <button class="pay-btn" id="payBtn">Pay Now</button>
      <p class="error-msg" id="formError"></p>
    `;
  }

  function showFormError(msg){
    document.getElementById('formError').textContent = msg;
  }
  function clearFormError(){
    const el = document.getElementById('formError');
    if (el) el.textContent = '';
  }
  function showFatalError(msg){
    checkoutCard.innerHTML = `<div class="error-state">${msg}</div>`;
  }

  init();
</script>

</body>
</html>
